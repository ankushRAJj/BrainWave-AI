name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: "pip"
        
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Generate ML Models
      working-directory: ./backend
      run: |
        python ml/train_model.py
        
    - name: Ensure backend runs
      working-directory: ./backend
      run: |
        # Quick check to ensure the predictor class loads without crashing
        python -c "from ml.predictor import PersonalityPredictor; p = PersonalityPredictor(); print('Model loaded successfully')"

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
        
    - name: Install dependencies
      working-directory: ./frontend
      run: npm install
      
    - name: Build React App
      working-directory: ./frontend
      run: npm run build
      
  docker-test:
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-frontend]
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker Compose Services
      run: docker-compose build
